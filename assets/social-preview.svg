      <circle cx="28" cy="24" r="10" fill="#a78bfa"/>
      <text x="50" y="31" fill="#e2e8f0" font-size="20" font-weight="650">elkjop-no</text>
    </g>
  </g>

  <g transform="translate(814 178)">
    <rect x="0" y="0" width="306" height="250" rx="28" fill="#020617" opacity="0.82" stroke="#334155"/>
    <text x="30" y="48" fill="#38bdf8" font-family="JetBrains Mono, Consolas, monospace" font-size="18">retail-scrape catalog</text>
    <text x="30" y="88" fill="#cbd5e1" font-family="JetBrains Mono, Consolas, monospace" font-size="17">--channel elkjop-no</text>
    <text x="30" y="122" fill="#cbd5e1" font-family="JetBrains Mono, Consolas, monospace" font-size="17">--max-items 3</text>
    <text x="30" y="156" fill="#cbd5e1" font-family="JetBrains Mono, Consolas, monospace" font-size="17">--format jsonl</text>
    <rect x="30" y="188" width="246" height="1" fill="#334155"/>
    <text x="30" y="222" fill="#22c55e" font-family="JetBrains Mono, Consolas, monospace" font-size="17">✓ structured records</text>
