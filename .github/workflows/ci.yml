name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 安装
        run: python -m pip install -e ".[dev]"

      - name: 静态检查
        run: ruff check .

      - name: 类型检查
        run: mypy src/retail_scrapers

      - name: 单元测试
        run: pytest
