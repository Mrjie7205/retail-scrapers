name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src/retail_scrapers

      - name: Unit tests
        run: pytest

      - name: CLI smoke tests
        run: |
          python -m retail_scrapers channels
          python -m retail_scrapers schema
          python -m retail_scrapers schema catalog --format markdown
          python -m retail_scrapers health
          python -m retail_scrapers health --format markdown
          python -m retail_scrapers doctor --skip-browser

      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build backend
        run: python -m pip install build

      - name: Build source and wheel distributions
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-${{ github.sha }}
          path: dist/*
          retention-days: 7
