name: Manual live smoke test

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 渠道 ID
        required: true
        default: elkjop-no

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装
        run: |
          python -m pip install -e .
          python -m playwright install chromium --with-deps

      - name: 抓取少量目录
        run: |
          retail-scrape catalog \
            --channel "${{ inputs.channel }}" \
            --max-items 3 \
            --no-strict \
            --output output/smoke.jsonl

      - uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ inputs.channel }}-${{ github.run_id }}
          path: output/smoke.jsonl
          retention-days: 3
