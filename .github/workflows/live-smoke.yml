name: Manual live smoke test

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Channel to test
        required: true
        default: all
        type: choice
        options:
          - all
          - amazon-de
          - boulanger-fr
          - currys-gb
          - elkjop-no

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      channels: ${{ steps.matrix.outputs.channels }}
    steps:
      - id: matrix
        shell: bash
        run: |
          if [ "${{ inputs.channel }}" = "all" ]; then
            echo 'channels=["amazon-de","boulanger-fr","currys-gb","elkjop-no"]' >> "$GITHUB_OUTPUT"
          else
            echo 'channels=["${{ inputs.channel }}"]' >> "$GITHUB_OUTPUT"
          fi

  smoke:
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        channel: ${{ fromJSON(needs.prepare.outputs.channels) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -e .
          python -m playwright install chromium --with-deps

      - name: Scrape a small live catalog sample
        run: |
          retail-scrape catalog \
            --channel "${{ matrix.channel }}" \
            --max-items 3 \
            --timeout-ms 45000 \
            --retries 1 \
            --delay-seconds 0.5 \
            --no-strict \
            --output "output/smoke-${{ matrix.channel }}.jsonl"

      - uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.channel }}-${{ github.run_id }}
          path: output/smoke-${{ matrix.channel }}.jsonl
          retention-days: 3
